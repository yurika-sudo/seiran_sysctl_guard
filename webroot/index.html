<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seiran Toolkit</title>
<style>
  :root {
    --bg: #0f0f13; --surface: #1a1a24; --border: #2a2a3a;
    --accent: #7c6fe0; --accent2: #5dbbff;
    --text: #e4e4f0; --muted: #6b6b88; --success: #4caf82; --danger: #f07070; --warn: #e0a83c;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f4f8; --surface: #ffffff; --border: #dcdce4;
      --accent: #5b4bd6; --accent2: #2b7fd6;
      --text: #1c1c26; --muted: #6b6b80; --success: #2e8b57; --danger: #c23838; --warn: #b5820a;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; padding: 16px; padding-bottom: 70px; }
  h1 { font-size: 16px; font-weight: 700; color: var(--accent); margin-bottom: 16px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .card-title { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent2); margin-bottom: 10px; }
  .row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .row:last-child { margin-bottom: 0; }
  label { font-size: 12px; color: var(--muted); flex: 1; }
  .val { font-size: 12px; font-variant-numeric: tabular-nums; font-family: monospace; }
  select, input[type=range] { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 7px; }
  select { padding: 5px 8px; font-size: 12px; }
  select.pending, input.pending { opacity: 0.45; }
  .core-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .core-btn { text-align: center; padding: 8px 0; border-radius: 8px; font-size: 12px; font-family: monospace; border: 1px solid var(--border); cursor: pointer; background: var(--bg); }
  .core-btn.on { color: var(--success); }
  .core-btn.off { color: var(--danger); opacity: 0.6; }
  .core-btn.locked { cursor: default; opacity: 0.4; }
  .core-warn { color: var(--warn); font-size: 11px; margin-top: 8px; display: none; }
  .err-banner { display: none; background: var(--danger); color: #fff; padding: 8px 12px; border-radius: 8px; font-size: 12px; margin-bottom: 10px; white-space: pre-wrap; }
  .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .header-row h1 { margin-bottom: 0; }
  #themeSelect { font-size: 11px; padding: 4px 6px; }
  footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 10px 16px; display: flex; gap: 8px; }
  button { flex: 1; padding: 10px; border: none; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; background: var(--border); color: var(--text); }
  button.danger { background: var(--danger); color: #fff; flex: 0 0 auto; padding: 10px 16px; }
</style>
</head>
<body>
<div class="header-row">
  <h1>Seiran Toolkit</h1>
  <select id="themeSelect"></select>
</div>
<div class="err-banner" id="errBanner"></div>

<div class="card"><div class="card-title">Battery</div><div id="batt" class="val">loading...</div></div>

<div class="card">
  <div class="card-title">ZRAM</div>
  <div class="row"><label>Size</label><select id="zramSize"></select></div>
  <div class="row"><label>Algorithm</label><select id="zramAlgo"></select></div>
</div>

<div class="card" id="cluster0Card">
  <div class="card-title">CPU Cluster 0</div>
  <div class="row"><label>Governor</label><select id="c0Gov"></select></div>
  <div class="row"><label>Min Freq</label><select id="c0Min"></select></div>
  <div class="row"><label>Max Freq</label><select id="c0Max"></select></div>
</div>
<div class="card" id="cluster1Card">
  <div class="card-title">CPU Cluster 1</div>
  <div class="row"><label>Governor</label><select id="c1Gov"></select></div>
  <div class="row"><label>Min Freq</label><select id="c1Min"></select></div>
  <div class="row"><label>Max Freq</label><select id="c1Max"></select></div>
</div>

<div class="card">
  <div class="card-title">Core Online</div>
  <div class="core-grid" id="coreGrid"></div>
  <div class="core-warn" id="coreWarn">⚠ multiple cores offline — may affect responsiveness</div>
</div>

<div class="card">
  <div class="card-title">GPU</div>
  <div class="row"><label>Governor</label><span class="val" id="gpuGov">—</span></div>
  <div class="row"><label>Min Freq</label><select id="gpuMin"></select></div>
  <div class="row"><label>Max Freq</label><select id="gpuMax"></select></div>
</div>

<div class="card">
  <div class="card-title">TCP Congestion</div>
  <div class="row"><label>Algorithm</label><select id="tcpAlgo"></select></div>
</div>

<div class="card">
  <div class="card-title">Other</div>
  <div class="row"><label>Freeze GMS</label><input type="checkbox" id="gmsOff"></div>
  <div class="row"><label>Fast Charge</label><input type="checkbox" id="fcOn"></div>
</div>

<footer>
  <button onclick="load()">Refresh</button>
  <button class="danger" onclick="doNuke()">Nuke</button>
</footer>

<script>
// this is the whole "theme system" — a name→color map and one
// function that overwrites two CSS custom properties already used
// everywhere in the stylesheet. no component library, no build step.
const THEMES = {
  default: { accent: "#7c6fe0", accent2: "#5dbbff" },
  blue:    { accent: "#3b82f6", accent2: "#60a5fa" },
  red:     { accent: "#ef4444", accent2: "#f87171" },
  purple:  { accent: "#a855f7", accent2: "#c084fc" },
  green:   { accent: "#22c55e", accent2: "#4ade80" },
  orange:  { accent: "#f97316", accent2: "#fb923c" },
  pink:    { accent: "#ec4899", accent2: "#f472b6" },
  cyan:    { accent: "#06b6d4", accent2: "#22d3ee" },
  grey:    { accent: "#6b7280", accent2: "#9ca3af" },
};
function applyTheme(name) {
  const t = THEMES[name] || THEMES.default;
  document.documentElement.style.setProperty("--accent", t.accent);
  document.documentElement.style.setProperty("--accent2", t.accent2);
}
(function initTheme() {
  const sel = document.getElementById("themeSelect");
  Object.keys(THEMES).forEach(name => {
    const o = document.createElement("option");
    o.value = name; o.textContent = name[0].toUpperCase() + name.slice(1);
    sel.appendChild(o);
  });
  const saved = localStorage.getItem("seiran_theme") || "default";
  sel.value = saved;
  applyTheme(saved); // pure client-side, no bridge needed — runs immediately, no flash of default color
  sel.onchange = e => { localStorage.setItem("seiran_theme", e.target.value); applyTheme(e.target.value); };
})();

function exec(cmd) {
  return new Promise((resolve) => {
    const cb = "excb_" + Math.random().toString(36).slice(2);
    let settled = false;
    const finish = (out) => {
      if (settled) return; settled = true;
      clearTimeout(timer); delete window[cb];
      resolve(out || "");
    };
    window[cb] = function () {
      const a = Array.prototype.slice.call(arguments);
      let stdout = "", errno = 0, stderr = "";
      if (a.length >= 2) {
        errno = a[0]; stdout = a[1] || ""; stderr = a[2] || "";
      } else if (a.length === 1 && typeof a[0] === "string") {
        try {
          const j = JSON.parse(a[0]);
          if (j && typeof j === "object") {
            stdout = j.stdout ?? j.output ?? j.result ?? "";
            errno = j.errno ?? j.code ?? 0;
            stderr = j.stderr ?? "";
          } else { stdout = a[0]; }
        } catch (e) { stdout = a[0]; }
      }
      if (Number(errno) !== 0 && stderr) showError(cmd + " → exit " + errno + ": " + stderr);
      finish(stdout);
    };
    const timer = setTimeout(() => {
      showError("timeout: ksu.exec never called back after 60s\ncmd: " + cmd);
      finish("");
    }, 60000); // matches the timeout budget used by a known-working reference module (specter) for this same bridge
    try { ksu.exec(cmd, "{}", cb); }
    catch (e) { showError("ksu.exec threw: " + (e && e.message ? e.message : e)); finish(""); }
  });
}
const MOD = "/data/adb/modules/seiran_toolkit"; // ponytail: hardcoded — a literal $MODDIR in a cmd string only works if ksu.exec's shell has it exported, unverified. action.sh gets it free via $0, this doesn't.
function parse(txt) {
  let o = {};
  (txt||"").split("\n").forEach(l => { let i=l.indexOf("="); if(i>0) o[l.slice(0,i)] = l.slice(i+1); });
  return o;
}
function fillSelect(sel, options, current) {
  // two guards against the poll fighting the user — skip while the
  // control has focus (dropdown open / being decided), and skip the rebuild
  // entirely if nothing actually changed (avoids flicker + avoids dropping an
  // open native picker for no reason).
  if (document.activeElement === sel) return;
  const sig = options.join(",") + "|" + current;
  if (sel.dataset.sig === sig) return;
  sel.dataset.sig = sig;
  sel.innerHTML = "";
  options.filter(Boolean).forEach(v => {
    let o = document.createElement("option");
    o.value = v; o.textContent = v; if (v === current) o.selected = true;
    sel.appendChild(o);
  });
}
function setChecked(el, val) {
  if (document.activeElement === el) return;
  el.checked = val;
}
async function withPending(el, promise) {
  // immediate feedback the moment a control changes, independent of
  // how slow the actual operation is — dim+disable now, undim on settle. this
  // is what "should show loading" needed, not a faster backend.
  el.disabled = true;
  el.classList.add("pending");
  try { await promise; }
  finally { el.disabled = false; el.classList.remove("pending"); load(); }
}
function showError(msg) {
  const b = document.getElementById("errBanner");
  b.textContent = msg; b.style.display = "block";
}
function clearError() { document.getElementById("errBanner").style.display = "none"; }

const ZRAM_SIZES = [1024, 2048, 3072, 4096, 6144, 8192, 9216];

let pollTimer = null;
async function loadUnsafe() {
  const raw = await exec(`sh ${MOD}/apply.sh status`);
  const s = parse(raw);
  if (Object.keys(s).length === 0) {
    showError("status returned nothing parseable. raw response (first 300 chars):\n" + JSON.stringify(raw).slice(0, 300));
    return;
  }

  document.getElementById("batt").innerText =
    `${s.battery_capacity}%  ${s.battery_current_ma}mA  ${s.battery_power_w}W  ${s.battery_temp_c}°C  ${s.battery_cycles} cycles`;

  fillSelect(document.getElementById("zramSize"), ZRAM_SIZES.map(String), s.zram_size_mb);
  fillSelect(document.getElementById("zramAlgo"), (s.zram_algo_available||"").trim().split(/\s+/), s.zram_algo_current || s.zram_algo);

  fillSelect(document.getElementById("c0Gov"), (s.cpu0_gov_available||"").trim().split(/\s+/), s.cpu0_gov_current);
  fillSelect(document.getElementById("c0Min"), (s.cpu0_freqs_available||"").trim().split(/\s+/), s.cpu0_minfreq_current);
  fillSelect(document.getElementById("c0Max"), (s.cpu0_freqs_available||"").trim().split(/\s+/), s.cpu0_maxfreq_current);
  if (Number(s.cpu_clusters) >= 2) {
    fillSelect(document.getElementById("c1Gov"), (s.cpu1_gov_available||"").trim().split(/\s+/), s.cpu1_gov_current);
    fillSelect(document.getElementById("c1Min"), (s.cpu1_freqs_available||"").trim().split(/\s+/), s.cpu1_minfreq_current);
    fillSelect(document.getElementById("c1Max"), (s.cpu1_freqs_available||"").trim().split(/\s+/), s.cpu1_maxfreq_current);
  } else {
    document.getElementById("cluster1Card").style.display = "none";
  }

  document.getElementById("gpuGov").innerText = s.gpu_gov_current || "—";
  fillSelect(document.getElementById("gpuMin"), (s.gpu_freqs_available||"").trim().split(/\s+/), s.gpu_minfreq_current);
  fillSelect(document.getElementById("gpuMax"), (s.gpu_freqs_available||"").trim().split(/\s+/), s.gpu_maxfreq_current);
  fillSelect(document.getElementById("tcpAlgo"), (s.tcp_available||"").trim().split(/\s+/), s.tcp_cong);
  setChecked(document.getElementById("gmsOff"), s.gms_disabled_actual === "1");
  setChecked(document.getElementById("fcOn"), s.fastcharge_enabled === "1");

  // only rebuild the core grid if the on/off pattern actually
  // changed — this is what let a poll tick swap the DOM node out from under
  // a finger mid-tap, making buttons feel unclickable.
  let sig = "", offCount = 0, i = 0;
  while (s["core" + i + "_online"] !== undefined) { sig += s["core" + i + "_online"]; if (s["core" + i + "_online"] !== "1") offCount++; i++; }
  const grid = document.getElementById("coreGrid");
  if (grid.dataset.sig !== sig) {
    grid.dataset.sig = sig;
    grid.innerHTML = "";
    let j = 0;
    while (s["core" + j + "_online"] !== undefined) {
      const on = s["core" + j + "_online"] === "1";
      const btn = document.createElement("div");
      const idx = j;
      btn.className = "core-btn " + (on ? "on" : "off") + (idx === 0 ? " locked" : "");
      btn.textContent = "CPU" + idx + (on ? " on" : " off");
      if (idx > 0) btn.onclick = () => exec(`sh ${MOD}/apply.sh set-core ${idx} ${on ? 0 : 1}`).then(load);
      grid.appendChild(btn);
      j++;
    }
  }
  document.getElementById("coreWarn").style.display = offCount >= 2 ? "block" : "none";
  clearError();
}

let busy = false;
async function load() {
  if (busy) return;
  busy = true;
  try { await loadUnsafe(); }
  catch (e) { showError("load() failed: " + (e && e.message ? e.message : e)); }
  finally { busy = false; }
}

async function doNuke() {
  if (!confirm("Reset everything and turn off all tweaks now? No reboot needed, can't be undone.")) return;
  try { const out = await exec(`sh ${MOD}/apply.sh nuke`); showError(out); await loadUnsafe(); }
  catch (e) { showError("nuke failed: " + (e && e.message ? e.message : e)); }
}

function waitForKsu(cb, tries) {
  tries = tries || 0;
  if (window.ksu && typeof ksu.exec === "function") {
    exec("echo warmup"); // ponytail: pay the suspected cold-start bridge cost now, not on the user's first real tap
    return cb();
  }
  if (tries > 50) return showError("ksu bridge never became available (waited 5s)");
  setTimeout(() => waitForKsu(cb, tries + 1), 100);
}

document.getElementById("zramSize").onchange = e => withPending(e.target, exec(`sh ${MOD}/apply.sh set-zram 1 ${e.target.value}`));
document.getElementById("zramAlgo").onchange = e => withPending(e.target, exec(`sh ${MOD}/apply.sh set-zram-algo ${e.target.value}`));
document.getElementById("c0Gov").onchange = e => withPending(e.target, exec(`sh ${MOD}/apply.sh set-cpu-gov 0 ${e.target.value}`));
document.getElementById("c0Min").onchange = e => withPending(e.target, exec(`sh ${MOD}/apply.sh set-cpu-minfreq 0 ${e.target.value}`));
document.getElementById("c0Max").onchange = e => withPending(e.target, exec(`sh ${MOD}/apply.sh set-cpu-maxfreq 0 ${e.target.value}`));
document.getElementById("c1Gov").onchange = e => withPending(e.target, exec(`sh ${MOD}/apply.sh set-cpu-gov 1 ${e.target.value}`));
document.getElementById("c1Min").onchange = e => withPending(e.target, exec(`sh ${MOD}/apply.sh set-cpu-minfreq 1 ${e.target.value}`));
document.getElementById("c1Max").onchange = e => withPending(e.target, exec(`sh ${MOD}/apply.sh set-cpu-maxfreq 1 ${e.target.value}`));
document.getElementById("gpuMin").onchange = e => withPending(e.target, exec(`sh ${MOD}/apply.sh set-gpu-minfreq ${e.target.value}`));
document.getElementById("gpuMax").onchange = e => withPending(e.target, exec(`sh ${MOD}/apply.sh set-gpu-maxfreq ${e.target.value}`));
document.getElementById("tcpAlgo").onchange = e => withPending(e.target, exec(`sh ${MOD}/apply.sh set-tcp ${e.target.value}`));
document.getElementById("gmsOff").onchange = e => exec(`sh ${MOD}/apply.sh set-gms ${e.target.checked ? 1 : 0}`);
document.getElementById("fcOn").onchange = e => exec(`sh ${MOD}/apply.sh set-fastcharge ${e.target.checked ? 1 : 0}`);

document.addEventListener("visibilitychange", () => {
  if (document.hidden) { clearInterval(pollTimer); } else { pollTimer = setInterval(load, 900); }
});
waitForKsu(() => { load(); pollTimer = setInterval(load, 900); });
</script>
</body>
</html>
